name: Manage Stale Issues & PRs

on:
  schedule:
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Process Stale Items
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-message: |
            ### ⏰ This issue has been marked as stale

            This issue has been inactive for 60 days. It will be automatically closed in 14 days unless:

            - A maintainer removes the `stale` label
            - New activity occurs
            - The `keep` label is applied

            If this issue is still relevant, please provide an update.
          stale-issue-label: 'stale'
          exempt-issue-labels: 'keep,pinned,security,bug,enhancement'
          stale-pr-message: |
            ### ⏰ This pull request has been marked as stale

            This PR has been inactive for 30 days. It will be automatically closed in 7 days unless:

            - A maintainer removes the `stale` label
            - New commits are pushed
            - The `keep` label is applied
          stale-pr-label: 'stale'
          exempt-pr-labels: 'keep,pinned,work-in-progress,dependencies'
          remove-stale-when-updated: true
          operations-per-run: 100
