name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Greet Newcomer
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const welcomeMessage = `
            ### 👋 Welcome to Relax Sound!

            Thank you for your contribution! 🎉

            To help us process this quickly:
            1. ✅ Fill out all sections of the template
            2. 🔍 Search [existing issues](https://github.com/${{ github.repository }}/issues) for duplicates
            3. 💬 Reply to any questions from maintainers

            In the meantime, feel free to:
            - Email us at @Sanot
            - Check our [Contributing Guide](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)
            - Browse the [README](https://github.com/${{ github.repository }}#readme)
            `;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.actor,
              state: 'all',
              per_page: 1
            });

            if (issues.data.length === 1) {
              const issueNumber = (context.payload.issue || context.payload.pull_request).number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: welcomeMessage
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['welcome', 'first-contribution']
              });
            }
