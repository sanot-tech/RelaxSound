name: 💡 Feature Request
description: Suggest an idea for Relax Sound
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Feature Request
        Thanks for suggesting an improvement!

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Sound / Audio
        - Timer Feature
        - UI / Visuals
        - Performance
        - Mobile App
        - Accessibility
        - Other

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, screenshots, or reference implementations
